<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  .meun{
    margin: 50px;
    display: flex;
    gap: 3rem;
    list-style-type: none;
  }
  .meun > li{
    display: flex;
    align-items: center;
    justify-content: space-between;

    cursor: pointer;
    width: 200px;
    padding: 10px;
    position: relative;
    background-color: rgb(1, 176, 189);
  }
  /* icon */
  .meun > li > i{
    color: white;
    font-size: 20px;
    transition: all 3s ease-in-out;
  }
  .meun > li:hover > i{
    transition: all 3s ease-in-out;
    transform: rotate(180deg);
  }
  .meun > li > a , .meun > li > .dorpdown > li > a{
    color: white;
    font-size: 20px;
    text-decoration: none;
  }
  .meun > li > .dorpdown{
    /* option1 */
    /* display-none */

    /* option2 */
    height: 0px;
    overflow: hidden;
    /* wigth100% */
    transition: all 3s ease-in-out;
    width: 300px;
    position: absolute;
    left: 0px;
    top: 100%;
    list-style-type: none;
    border-top: 2px solid white;
    background-color: rgb(1, 159, 171);
  }
  /* showdropdown */
  .meun > li:hover > .dorpdown{
    /* option1 */
    /* display: block; */
    /* option2 */
    height: 175px;
    transition: all 3s ease-in-out;
  }
  .meun > li > .dorpdown > li{
    padding: 10px;
    transition: all 3s ease-in-out;
  }
  .meun > li > .dorpdown > li:hover{
    transition: all 3s ease-in-out;
    background-color: rgba(2, 197, 211, 0.646);
  }
</style>
<body>
  <ul class="meun">
    <li>
      <a href="">Dropdown</a>
      <i class="fa-solid fa-angle-down"></i>

      <ul class="dorpdown">
        <li><a href="">Facebook</a></li>
        <li><a href="">TikTok</a></li>
        <li><a href="">Telegram</a></li>
        <li><a href="">Instargram</a></li>
      </ul>
    </li>
  </ul>
</body>
</html>
